    <style type="text/tailwindcss">
        @layer components {
            .nav-btn {
                @apply flex items-start w-full text-left px-3 py-2 mb-1 rounded-xl text-[13px] font-medium text-slate-400 transition-all duration-200 border border-transparent bg-transparent;
            }
            .nav-btn:hover {
                @apply bg-white/5 text-slate-200;
            }
            .nav-btn.active {
                @apply bg-indigo-500/10 text-indigo-300 border-indigo-500/20 shadow-sm;
            }
            .nav-btn.active .icon-wrapper {
                @apply text-indigo-400 !important;
            }
            
            /* Collapsed state styles for desktop */
            @media (min-width: 768px) {
                #sidebar.is-collapsed {
                    width: 72px;
                }
                #sidebar.is-collapsed .hide-on-collapse {
                    display: none !important;
                }
                #sidebar.is-collapsed .nav-btn, #sidebar.is-collapsed .folder-header {
                    justify-content: center;
                    padding: 12px 0;
                    margin-bottom: 8px;
                }
                #sidebar.is-collapsed .icon-wrapper, #sidebar.is-collapsed .folder-icon {
                    margin: 0 !important;
                    transform: scale(1.2);
                }
                #sidebar.is-collapsed .chevron-icon {
                    display: none;
                }
                #sidebar.is-collapsed #desktop-toggle-container {
                    justify-content: center;
                    padding-left: 0;
                    padding-right: 0;
                }
                #sidebar.is-collapsed .folder-content {
                    margin-left: 0;
                    padding-left: 0;
                    border-left: none;
                }
            }
            
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                @apply bg-slate-600 rounded-full hover:bg-slate-500;
            }
        }
    </style>
</head>

            const docIcon = `<svg class="w-4 h-4 min-w-[16px]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>`;
            const checkIcon = `<svg class="w-4 h-4 min-w-[16px]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            const playIcon = `<svg class="w-4 h-4 min-w-[16px]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15.91 11.672a.375.375 0 010 .656l-5.603 3.113a.375.375 0 01-.557-.328V8.887c0-.286.307-.466.557-.327l5.603 3.112z"></path></svg>`;

            let iconSvg = playIcon;
            let iconColor = 'text-slate-400';

            if (lowerText.includes('reading') || lowerText.includes('notes')) {
                iconColor = 'text-emerald-400';
                iconSvg = docIcon;
            } else if (lowerText.includes('aq') || lowerText.includes('activity') || lowerText.includes('practice')) {
                iconColor = 'text-orange-400';
                iconSvg = checkIcon;
            } else if (lowerText.includes('graded')) {
                iconColor = 'text-rose-400';
                iconSvg = checkIcon;
            } else if (lowerText.includes('quiz') || lowerText.includes('exam')) {
                iconColor = 'text-indigo-400';
                iconSvg = checkIcon;
            }

            return { svg: iconSvg, color: iconColor };
        }

        // --- HASH ROUTING & STATE MANAGEMENT ---
        function handleHashChange() {
            // Remove the # to get the raw file path
            const rawHash = window.location.hash.substring(1);
            
            if (!rawHash || rawHash === 'dashboard') {
                showDashboard();
                return;
            }

            // Decode the hash to safely match against the data-path attribute (which handles spaces)
            const decodedHash = decodeURIComponent(rawHash);
            const safeQueryPath = decodedHash.replace(/"/g, '\\"');

            // ALWAYS switch UI from Dashboard to Iframe Viewer
            document.getElementById('home-dashboard').classList.add('hidden');
            document.getElementById('iframe-container').classList.remove('hidden');
            document.getElementById('back-to-dash').classList.remove('hidden');

            // Try to find the button for this file in the currently rendered sidebar
            let btn = document.querySelector(`.nav-btn[data-path="${safeQueryPath}"]`);
            
            // If the button isn't found (because we refreshed, or we're on the dashboard)
            if (!btn) {
                const rootIndex = findRootIndexForPath(decodedHash);
                if (rootIndex !== -1) {
                    loadSidebarMode('single', rootIndex, false); // Load the specific course
                } else {
                    loadSidebarMode('all', null, false); // Fallback: load everything
                }
                // Try finding the button again now that the sidebar is rendered
                btn = document.querySelector(`.nav-btn[data-path="${safeQueryPath}"]`);
            }

            if (btn) {
                // UI Updates
                expandParents(btn);
                
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.getElementById('mobile-title').innerText = btn.getAttribute('title');
            }
            
            // Load iframe using the raw encoded hash so the browser fetches it correctly
            document.getElementById('viewer').src = rawHash;
        }

        // Helper: Find which top-level array index contains a specific file path
        function findRootIndexForPath(targetPath) {
            function pathExistsInNode(node) {
                if (node.type === 'file' && node.path && decodeURIComponent(node.path) === targetPath) return true;
                if (node.children) return node.children.some(child => pathExistsInNode(child));
                return false;
            }
            
            for(let i = 0; i < globalSiteData.length; i++) {
                if (pathExistsInNode(globalSiteData[i])) return i;
            }
            return -1;
        }

        // Helper: Automatically expand all parent folders of a specific file
        function expandParents(element) {
            let parent = element.parentElement;
            while (parent && parent.id !== 'sidebar-content') {
                if (parent.classList.contains('folder-content')) {
                    parent.classList.remove('hidden');
                    const header = parent.previousElementSibling;
                    if (header && header.classList.contains('folder-header')) {
                        const chevron = header.querySelector('.chevron-icon');
                        if (chevron && !chevron.classList.contains('rotate-180')) {
                            chevron.classList.add('rotate-180');
                        }
                    }
                }
                parent = parent.parentElement;
            }
        }

        // Triggered by clicking a file button
        function loadPage(filePath) {
            if (!filePath || filePath === 'null' || filePath === 'about:blank' || filePath.includes('index.html')) {
                console.warn("Invalid file path prevented from loading: ", filePath);
                return;
            }

            // Update URL (This will trigger handleHashChange automatically)
            window.location.hash = filePath;

            // Automatically close the sidebar on mobile after clicking a link
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('-translate-x-full')) {
                    toggleSidebar();
                }
            }
        }

        // --- DASHBOARD RENDERING ---
        function showDashboard() {
            // UI Toggles
            document.getElementById('iframe-container').classList.add('hidden');
            document.getElementById('home-dashboard').classList.remove('hidden');
            document.getElementById('mobile-title').innerText = "Dashboard";
            document.getElementById('viewer').src = 'about:blank';
            
            // Sidebar UI Reset
            document.getElementById('back-to-dash').classList.add('hidden');
            document.getElementById('sidebar-title').innerText = "IITM Archive";
            document.getElementById('sidebar-subtitle').innerText = "Select a course to begin";
            
            const sidebarContainer = document.getElementById('sidebar-content');
            sidebarContainer.innerHTML = `
                <div class="text-center mt-12 px-4 hide-on-collapse">
                    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white/5 mb-3 text-slate-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    </div>
                    <p class="text-slate-400 text-sm">Please select a course from the dashboard.</p>
                </div>
            `;

            // Render Dashboard Cards
            const grid = document.getElementById('dashboard-grid');
            let html = '';
            
            html += `
                <div onclick="clickDashboardCard('all')" class="group cursor-pointer bg-gradient-to-br from-[#4d3cc9] to-indigo-500 rounded-2xl p-6 text-white shadow-md hover:shadow-xl transition-all transform hover:-translate-y-1 relative overflow-hidden">
                    <div class="absolute -right-6 -top-6 text-white/10 group-hover:text-white/20 transition-colors">
                        <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                    </div>
                    <div class="relative z-10">
                        <h3 class="text-xl font-bold mb-2">Browse All Content</h3>
                        <p class="text-indigo-100 text-sm">View the entire unfiltered archive tree.</p>
                    </div>
                </div>
            `;

            globalSiteData.forEach((node, index) => {
                if (node.type === 'folder') {
                    const itemCount = node.children ? node.children.length : 0;
                    html += `
                        <div onclick="clickDashboardCard('single', ${index})" class="cursor-pointer bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-lg hover:border-indigo-300 transition-all transform hover:-translate-y-1">
                            <div class="w-10 h-10 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center mb-4">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-1 truncate" title="${node.name}">${node.name}</h3>
                            <p class="text-slate-500 text-sm">${itemCount} Modules / Weeks</p>
                        </div>
                    `;
                }
            });
            
            grid.innerHTML = html;

            // Ensure sidebar is closed on mobile when returning to dash
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
        }

        // Triggered by clicking a card on the dashboard
        function clickDashboardCard(mode, index = null) {
            // Render the targeted sidebar branch
            loadSidebarMode(mode, index, true);
        }

        function loadSidebarMode(mode, index = null, autoClickFirst = false) {
            const sidebarContainer = document.getElementById('sidebar-content');
            let htmlToRender = '';
            
            if (mode === 'all') {
                document.getElementById('sidebar-title').innerText = "All Content";
                document.getElementById('sidebar-subtitle').innerText = "Full Archive";
                htmlToRender = renderTree(globalSiteData);
            } else if (mode === 'single' && index !== null) {
                const selectedNode = globalSiteData[index];
                document.getElementById('sidebar-title').innerText = selectedNode.name;
                document.getElementById('sidebar-subtitle').innerText = "Course View";
                htmlToRender = renderTree(selectedNode.children || []);
            }

            sidebarContainer.innerHTML = htmlToRender;
            
            if (autoClickFirst) {
                // Expand first folder automatically if available
                const firstFolder = sidebarContainer.querySelector('.folder-header');
                if (firstFolder) firstFolder.click();

                // Auto-load the first available file to trigger routing
                const firstBtn = sidebarContainer.querySelector('.nav-btn.file-btn');
                if (firstBtn) {
                    window.location.hash = firstBtn.getAttribute('data-path');
                }
            }

            // Mobile management: Open sidebar so user can make a selection
            if (window.innerWidth < 768 && !autoClickFirst) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('mobile-overlay');
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        }

        // --- JSON TO UI BUILDER ---
        function renderTree(nodes) {
            let html = '';
            
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    html += `
                        <div class="folder-wrapper mb-2">
                            <div class="folder-header flex justify-between items-center px-3 py-3 cursor-pointer text-slate-200 hover:bg-white/5 bg-[#242528] border border-white/5 rounded-xl transition-colors shadow-sm" onclick="toggleFolder(this)">
                                <div class="flex items-center truncate pr-2">
                                    <svg class="folder-icon w-4 h-4 mr-3 flex-shrink-0 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                                    <span class="text-[13px] font-extrabold tracking-wide truncate hide-on-collapse" title="${node.name}">${node.name}</span>
                                </div>
                                <svg class="chevron-icon w-4 h-4 text-slate-400 transform transition-transform duration-200 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                            <div class="folder-content hidden pl-1 pr-1 pt-2 border-l border-[#2b2c2f] ml-5 mt-1">
                                ${renderTree(node.children || [])}
                            </div>
                        </div>
                    `;
                } else if (node.type === 'file') {
                    const iconData = getIconForFile(node.name);
                    const safePath = node.path && node.path.trim() !== '' ? node.path : 'about:blank';
                    const decodedPath = safePath !== 'about:blank' ? decodeURIComponent(safePath) : 'about:blank';
                    
                    html += `
                        <button class="nav-btn file-btn group" onclick="loadPage('${safePath}')" data-path="${decodedPath.replace(/"/g, '&quot;')}" title="${node.name}">
                            <div class="mr-3 mt-[2px] icon-wrapper ${iconData.color} transition-all duration-200 flex-shrink-0">
                                ${iconData.svg}
                            </div>
                            <span class="leading-relaxed flex-1 hide-on-collapse whitespace-nowrap overflow-hidden text-ellipsis">${node.name}</span>
                        </button>
                    `;
                }
            });
            return html;
        }

        function initSidebarData() {
            const scriptTag = document.getElementById('site-data');
            if (!scriptTag) return;
            try {
                globalSiteData = JSON.parse(scriptTag.textContent);
            } catch (e) {
                console.error("Error parsing sidebar JSON: ", e);
            }
        }

        // --- UI INTERACTION LOGIC ---
        function toggleFolder(element) {
            const chevron = element.querySelector('.chevron-icon');
            if (chevron) chevron.classList.toggle('rotate-180');
            
            const content = element.nextElementSibling;
            if (content && content.classList.contains('folder-content')) {
                content.classList.toggle('hidden');
            }

            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth >= 768 && sidebar.classList.contains('is-collapsed')) {
                toggleDesktopSidebar();
            }
        }

        function toggleDesktopSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('is-collapsed');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- SYNCHRONOUS INIT ---
        // Executes immediately as the HTML is parsed, avoiding any visual flicker
        initSidebarData();
        
        // Setup listener for future navigations
        window.addEventListener('hashchange', handleHashChange);
        
        // Process the very first frame correctly
        if (window.location.hash && window.location.hash !== '#dashboard') {
            handleHashChange(); // Go straight to the iframe file
        } else {
            showDashboard(); // Go straight to the dashboard
        }
    </script>
</body>
</html>
