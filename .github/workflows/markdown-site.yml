name: Markdown Reading Vault

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/**'
      - '.github/workflows/markdown-site.yml'
  workflow_dispatch:

jobs:
  build-reading-vault:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Clear Old Cache
        run: |
          rm -rf markdown/extracted/*
          mkdir -p markdown/extracted/assets

      - name: Extract Markdown from Archives
        run: npm run markdown:extract
        env:
          NODE_OPTIONS: "--expose-gc --max-old-space-size=6144"

      - name: Generate Site Index
        run: npm run markdown:index

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add markdown/extracted/ markdown/index.json
          git commit -m "🚀 Auto-update Markdown Vault [skip ci]" || echo "No changes to commit"
          git push
