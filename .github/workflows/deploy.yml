name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install unzip utility (just in case)
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Optimize SingleFileZ payloads
        run: node scripts/optimize-for-prod.js

      - name: Generate Sidebar Route Map
        run: node scripts/generate-sidebar.js

      - name: Build Tailwind CSS
        run: npm install && npx tailwindcss -i ./src/input.css -o ./assets/main.css --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
