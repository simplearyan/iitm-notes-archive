name: "🚀 Deploy Course Hub to GitHub Pages ✨"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install extraction utility (7z)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Optimize SingleFileZ payloads
        run: node scripts/optimize-for-prod.js

      - name: Generate Sidebar Route Map
        run: node scripts/generate-sidebar.js

      - name: Extract Markdown from Archives
        run: node scripts/extract-markdown.js

      - name: Generate Markdown Index
        run: node scripts/generate-markdown-index.js

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./src/input.css -o ./assets/main.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
