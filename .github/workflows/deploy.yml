name: "🚀 Deploy Course Hub to GitHub Pages ✨"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install extraction utility (7z)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Optimize SingleFileZ payloads
        run: node scripts/optimize-for-prod.js

      - name: Generate Sidebar Route Map
        run: node scripts/generate-sidebar.js

      - name: Clear Markdown Cache
        run: |
          rm -rf markdown/extracted/*
          mkdir -p markdown/extracted/assets

      - name: Extract Markdown Reading Vault
        run: node --expose-gc --max-old-space-size=6144 scripts/extract-to-markdown.js
        env:
          NODE_OPTIONS: "--expose-gc"

      - name: Generate Reading Vault Index
        run: node --max-old-space-size=2048 scripts/generate-markdown-index.js

      - name: Prep Deployment Artifact (Bypass ignores)
        run: |
          rm -f .gitignore
          rm -f markdown/.gitignore

      - name: "🚀 Sync Reading Vault to gh-pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./markdown
          publish_branch: gh-pages
          destination_dir: markdown
          commit_message: "🚀 Auto-update Markdown Vault [skip ci]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true

      - name: Build Tailwind CSS
        run: npx tailwindcss -i ./src/input.css -o ./assets/main.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
