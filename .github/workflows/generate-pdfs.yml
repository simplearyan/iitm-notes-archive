name: "📄 Standard Course PDF Generator 🛠️"

# 📄 Standard Course PDF Generator
on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.u.zip.html'       # only when course content changes
      - 'scripts/html-to-pdf.js'        # or the script itself is updated

  workflow_dispatch:
    inputs:
      force:
        description: 'Re-render all PDFs even if they already exist'
        required: false
        default: 'false'
        type: boolean
      week:
        description: 'Only convert a specific week / folder (e.g. "Week 1")'
        required: false
        default: ''
        type: string
      course:
        description: 'Course folder name (default: Mathematics-II)'
        required: false
        default: 'Mathematics-II'
        type: string

# Prevent multiple PDF jobs from clashing on the gh-pages branch
concurrency:
  group: pdf-storage
  cancel-in-progress: false

jobs:
  generate-pdfs:
    name: Convert HTML → PDF
    runs-on: ubuntu-latest

    permissions:
      contents: write          # needed to push the generated PDFs back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Puppeteer Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            chromium-${{ runner.os }}-

      - name: Install dependencies
        run: npm install puppeteer adm-zip
        env:
          PUPPETEER_SKIP_DOWNLOAD: ${{ steps.cache-chromium.outputs.cache-hit == 'true' && 'true' || 'false' }}

      - name: Build script arguments
        id: args
        run: |
          COURSE="${{ github.event.inputs.course || 'Mathematics-II' }}"
          ARGS="--input ./content/Term-Feb-to-May/${COURSE} --output ./output/pdf/${COURSE}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="${ARGS} --force"; fi
          if [ -n "${{ github.event.inputs.week }}" ]; then ARGS="${ARGS} --week \"${{ github.event.inputs.week }}\""; fi
          echo "args=${ARGS}" >> $GITHUB_OUTPUT
          echo "course=${COURSE}" >> $GITHUB_OUTPUT

      - name: Generate PDFs
        run: node scripts/html-to-pdf.js ${{ steps.args.outputs.args }}
        env:
          CI: 'true'

      - name: Count generated PDFs
        id: count
        run: |
          COUNT=$(find ./output/pdf -name '*.pdf' 2>/dev/null | wc -l)
          echo "count=${COUNT}" >> $GITHUB_OUTPUT

      - name: Upload PDF artifact
        if: steps.count.outputs.count > 0
        uses: actions/upload-artifact@v4
        with:
          name: iitm-pdfs-${{ steps.args.outputs.course }}-${{ github.run_number }}
          path: output/pdf/
          retention-days: 30

      - name: Deploy PDFs to gh-pages branch
        if: steps.count.outputs.count > 0
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/pdf
          publish_branch: gh-pages
          commit_message: "chore: update PDFs for ${{ steps.args.outputs.course }} [skip ci]"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
