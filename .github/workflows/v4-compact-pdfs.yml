name: "📐 v4 Compact Efficiency PDF Generator 📐"

# 📐 Generate space-saving, textbook-style PDFs with v4 logic!
on:
  workflow_dispatch:
    inputs:
      course:
        description: '📘 Course Directory (e.g. Mathematics-II)'
        required: true
        default: 'Mathematics-II'
        type: string
      week:
        description: '📅 Filter by Week (optional)'
        required: false
        default: ''
        type: string
      force:
        description: '🔄 Re-render existing PDFs?'
        required: false
        default: 'false'
        type: boolean

# Prevent multiple PDF jobs from clashing on the gh-pages branch
concurrency:
  group: pdf-storage
  cancel-in-progress: false

jobs:
  v4_convert:
    name: 📐 v4 Compact Rendering Engine
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Puppeteer & ZIP Tools
        run: npm install puppeteer adm-zip

      - name: 📐 Run v4 Compact PDF Converter
        run: |
          ARGS="--input ./content/Term-Feb-to-May/${{ github.event.inputs.course }} --output ./output/v4-pdf/${{ github.event.inputs.course }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "${{ github.event.inputs.week }}" ]; then ARGS="$ARGS --week \"${{ github.event.inputs.week }}\""; fi
          node scripts/v4-pdf.js $ARGS
        env:
          CI: 'true'

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v4-compact-pdfs-${{ github.event.inputs.course }}
          path: output/v4-pdf/
          retention-days: 14

      - name: "🚀 Deploy to branch: gh-pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/v4-pdf
          publish_branch: gh-pages
          destination_dir: v4-pdf
          commit_message: "📐 v4-pdf: sync storage for ${{ github.event.inputs.course }} 📐"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
