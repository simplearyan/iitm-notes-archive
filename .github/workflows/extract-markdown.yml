name: "📝 Extract Markdown from Archives"

on:
  workflow_dispatch:
    inputs:
      course_path:
        description: 'Course folder path (e.g., Term-Feb-to-May/Mathematics-II)'
        required: false
        default: ''

jobs:
  extract:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install extraction utility (7z)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extract Markdown from Archives
        run: node --expose-gc --max-old-space-size=6144 scripts/extract-markdown.js

      - name: Generate Markdown Index
        run: node --max-old-space-size=2048 scripts/generate-markdown-index.js

      - name: Inject Markdown Index into HTML
        run: node scripts/inject-markdown-index.js

      - name: Upload Markdown Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extracted-markdown-${{ github.run_id }}
          path: markdown/
          retention-days: 14

      - name: Deploy Markdown to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./markdown
          publish_branch: gh-pages
          destination_dir: markdown
          commit_message: "📝 markdown: sync extracted content and index"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet markdown/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update extracted markdown files'
          title: 'chore: update extracted markdown from archives'
          body: |
            Automated markdown extraction and index generation.
            
            📦 **Artifacts**: Available in workflow run for 14 days
            📝 **gh-pages**: https://simplearyan.github.io/iitm-notes-archive/markdown/
            
            Changes:
            - Extracted/updated markdown files from SingleFileZ archives
            - Regenerated search index with all documents
            - Injected index into markdown site HTML
            - Updated sidebar navigation tree

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add markdown/
          git commit -m "chore: update extracted markdown files"
          git push
